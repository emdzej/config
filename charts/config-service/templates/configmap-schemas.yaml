{{- if .Values.schemaFiles }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "config-service.configmap.schemas" . }}
  labels:
    {{- include "config-service.labels" . | nindent 4 }}
data:
  {{- range $filename, $content := .Values.schemaFiles }}
  {{ $filename }}: |
    {{- $content | nindent 4 }}
  {{- end }}
{{- end }}
