{{/*
  Sample Secret — included for reference.
  In production, manage secrets via External Secrets Operator, Sealed Secrets,
  or your GitOps secrets workflow. This template is provided as a working
  example so the chart is self-contained for local / dev testing.

  Enable by setting secret.create=true in values.
*/}}
{{- if .Values.secret | default false }}
{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secret.name | default (include "config-service.secret" .) }}
  labels:
    {{- include "config-service.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $value := .Values.secret.data }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
{{- end }}
