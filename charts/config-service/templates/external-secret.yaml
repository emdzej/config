{{/*
  ExternalSecret resources (external-secrets.io).

  Creates ExternalSecret objects that sync data from an external secret
  store (AWS Secrets Manager, Azure Key Vault, GCP Secret Manager, Vault,
  etc.) into Kubernetes Secrets. The generated Secrets are then referenced
  by envFromSecret entries in the Deployment.

  Requires the External Secrets Operator to be installed in the cluster.
*/}}
{{- range .Values.externalSecrets }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .name }}
  labels:
    {{- include "config-service.labels" $ | nindent 4 }}
spec:
  refreshInterval: {{ .refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .secretStoreRef.name }}
    kind: {{ .secretStoreRef.kind | default "ClusterSecretStore" }}
  target:
    name: {{ .name }}
    creationPolicy: Owner
  data:
    {{- range .data }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        key: {{ .remoteRef.key }}
        {{- if .remoteRef.property }}
        property: {{ .remoteRef.property }}
        {{- end }}
    {{- end }}
{{- end }}
